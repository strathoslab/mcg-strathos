<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Monitor de Conflictos Geopolíticos — Strathos Lab</title>
<link rel="icon" href="logo.svg">
<style>
  :root{
    --navy:#0F1A2E; --oro:#B8902A; --oro2:#B8902A;
    --gris:#4A5568; --linea:#E6E1D4; --fondo:#FAFAF7; --panel:#ffffff;
    --sube:#1f6f4a; --baja:#a33a2e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--fondo);color:var(--navy);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
    line-height:1.5;padding:32px 20px}
  .wrap{max-width:1080px;margin:0 auto}
  header{border-bottom:2px solid var(--navy);padding-bottom:16px;margin-bottom:8px}
  h1{font-size:24px;letter-spacing:-.01em}
  .sub{color:var(--gris);font-size:14px;margin-top:4px}
  .meta{font-size:12px;color:var(--gris);margin:12px 0 28px}
  .encuadre{background:#F5EEDE;border-left:3px solid var(--oro);
    padding:12px 14px;font-size:13px;color:#1A1A1A;margin-bottom:28px}
  h2{font-size:12px;text-transform:uppercase;letter-spacing:.09em;
    color:var(--navy);margin:32px 0 12px;font-weight:700}
  .senales{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
  .senal{background:var(--panel);border:1px solid var(--linea);
    border-left:3px solid var(--oro2);border-radius:3px;padding:11px 13px}
  .senal .tk{font-weight:700;font-size:14px}
  .senal .nm{font-size:11px;color:var(--gris);margin-bottom:6px}
  .senal .ct{font-size:11px;color:var(--gris);margin-top:5px}
  .teatro{margin-top:34px}
  .teatro > h3{font-size:17px;padding-bottom:7px;border-bottom:1px solid var(--navy);margin-bottom:4px}
  .conflicto{margin-top:18px}
  .conflicto > h4{font-size:13px;color:var(--navy);font-weight:700;margin-bottom:7px}
  table{width:100%;border-collapse:collapse;background:var(--panel);
    border:1px solid var(--linea);font-size:13px}
  th{background:var(--navy);color:#fff;text-align:left;padding:7px 9px;
    font-size:10px;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
  td{padding:7px 9px;border-top:1px solid var(--linea);vertical-align:top}
  tbody tr:nth-child(even){background:#FCFAF4}
  .tk{font-weight:700;white-space:nowrap}
  .num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  .up{color:var(--sube);font-weight:600}
  .dn{color:var(--baja);font-weight:600}
  .just{color:var(--gris);font-size:11.5px}
  .nd{color:#A8AEB8;font-style:italic}
  .flag{display:inline-block;background:var(--oro2);color:#fff;font-size:9px;
    padding:1px 5px;border-radius:2px;margin-left:5px;vertical-align:middle}
  footer{margin-top:44px;padding-top:14px;border-top:1px solid var(--linea);
    font-size:11px;color:var(--gris)}
  #err{background:#FBF1EF;border-left:3px solid var(--baja);padding:14px;font-size:13px}

  /* ---- identidad Strathos ---- */
  .marca{border-bottom:2px solid var(--navy);padding-bottom:0;margin-bottom:0}
  .marca-top{display:flex;align-items:center;justify-content:space-between;
    gap:16px;flex-wrap:wrap;padding-bottom:12px}
  .logo-link{display:flex;align-items:center;gap:10px;text-decoration:none}
  .logo{height:34px;width:auto;display:none}
  .wordmark{display:block;font-size:17px;font-weight:800;letter-spacing:.10em;
    color:var(--navy);line-height:1}
  .wordmark em{font-style:normal;font-weight:400;color:var(--oro);margin-left:5px}
  .producto{font-size:11px;text-transform:uppercase;letter-spacing:.12em;
    color:var(--gris);font-weight:600;text-align:right}
  .tabs{display:flex;gap:2px;flex-wrap:wrap}
  .tab{font-size:12.5px;padding:7px 14px;text-decoration:none;color:var(--gris);
    border:1px solid var(--linea);border-bottom:none;border-radius:3px 3px 0 0;
    background:#F1EEE4;font-weight:600;position:relative;top:1px}
  .tab:hover{color:var(--navy);background:#EAE5D8}
  .tab.activa{background:var(--navy);color:#fff;border-color:var(--navy)}
  .titulo{padding-top:18px}
  .titulo h1{font-size:23px;letter-spacing:-.01em}
  .titulo .sub{color:var(--gris);font-size:14px;margin-top:3px}
  .pie-marca{margin-top:34px;padding-top:14px;border-top:2px solid var(--navy);
    display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;
    font-size:11px;color:var(--gris)}
  .pie-marca b{color:var(--navy);letter-spacing:.06em}
</style>
</head>
<body>
<div class="wrap">
  <header class="marca">
    <div class="marca-top">
      <a href="index.html" class="logo-link" aria-label="Strathos Lab">
        <img alt="Strathos Lab" class="logo" id="logo">
        <span class="wordmark" id="wordmark">STRATHOS<em>LAB</em></span>
      </a>
      <span class="producto">Inteligencia estratégica · Monitor de Conflictos Geopolíticos</span>
    </div>
    <nav class="tabs"><a href="index.html" class="tab activa">Exposición</a><a href="mapa.html" class="tab">Mapa</a><a href="historial.html" class="tab">Historial</a></nav>
  </header>
  <div class="titulo">
    <h1>Monitor de exposición</h1>
    <div class="sub">Movimientos de mercado de los activos mapeados a conflictos activos</div>
  </div>
  <div class="meta" id="meta">Cargando datos...</div>
  <div id="app"></div>
  <div class="pie-marca">
    <span><b>STRATHOS LAB</b> · strathoslab.com</span>
    <span>Minería · Banca · Energía · Alimentos · Logística</span>
  </div>
  <footer id="pie"></footer>
</div>

<script>
const pct = v => v === null || v === undefined
  ? '<span class="nd">—</span>'
  : `<span class="${v >= 0 ? 'up' : 'dn'}">${v >= 0 ? '+' : ''}${v.toFixed(2)}%</span>`;

fetch('mcg_estado.json?v=' + Date.now())
  .then(r => { if (!r.ok) throw new Error('No se encontró mcg_estado.json'); return r.json(); })
  .then(d => {
    const m = d.meta;
    document.getElementById('meta').innerHTML =
      `Actualizado: <strong>${m.actualizado_utc}</strong> · ${m.vinculos} vínculos · ${m.tickers_ok} activos con datos` +
      (m.tickers_sin_datos.length ? ` · <span class="dn">sin datos: ${m.tickers_sin_datos.join(', ')}</span>` : '');

    let h = `<div class="encuadre"><strong>Encuadre.</strong> ${m.encuadre}</div>`;

    if (d.senales.length) {
      h += `<h2>Movimientos fuera de rango habitual</h2><div class="senales">`;
      d.senales.forEach(s => {
        h += `<div class="senal">
          <div class="tk">${s.ticker} ${pct(s.var_1d_pct)}</div>
          <div class="nm">${s.nombre}</div>
          <div>30d: ${pct(s.var_30d_pct)} · z: ${s.z_score}</div>
          <div class="ct">${s.conflicto}</div>
        </div>`;
      });
      h += `</div>`;
    }

    d.teatros.forEach(t => {
      h += `<div class="teatro"><h3>${t.teatro}</h3>`;
      t.conflictos.forEach(c => {
        h += `<div class="conflicto"><h4>${c.conflicto}</h4>
          <table><thead><tr>
            <th>Activo</th><th>Recurso</th>
            <th class="num">Precio</th><th class="num">1d</th>
            <th class="num">30d</th><th class="num">90d</th>
            <th class="num">Vol 30d</th><th>Tesis de exposición</th>
          </tr></thead><tbody>`;
        c.activos.forEach(a => {
          const x = a.datos;
          if (!x) {
            h += `<tr><td class="tk">${a.ticker}</td><td>${a.recurso}</td>
              <td colspan="5" class="nd">sin datos de mercado</td>
              <td class="just">${a.justificacion}</td></tr>`;
            return;
          }
          const alerta = x.z_score_ultimo_dia !== null
            && Math.abs(x.z_score_ultimo_dia) >= m.umbral_senal_sigma
            ? '<span class="flag">señal</span>' : '';
          h += `<tr>
            <td class="tk">${a.ticker}${alerta}<div class="nm" style="font-weight:400;font-size:11px;color:var(--gris)">${a.nombre}</div></td>
            <td>${a.recurso}</td>
            <td class="num">${x.precio}</td>
            <td class="num">${pct(x.var_1d_pct)}</td>
            <td class="num">${pct(x.var_30d_pct)}</td>
            <td class="num">${pct(x.var_90d_pct)}</td>
            <td class="num">${x.volatilidad_30d_anualizada_pct ?? '—'}%</td>
            <td class="just">${a.justificacion}</td>
          </tr>`;
        });
        h += `</tbody></table></div>`;
      });
      h += `</div>`;
    });

    document.getElementById('app').innerHTML = h;
    document.getElementById('pie').innerHTML =
      `Fuente de precios: ${m.fuente_precios}. Umbral de señal: ${m.umbral_senal_sigma} desvíos. ` +
      `Las señales indican movimientos estadísticamente inusuales, no relaciones causales con el conflicto. ` +
      `© Strathos Lab.`;
  })
  .catch(e => {
    document.getElementById('meta').innerHTML = '';
    document.getElementById('app').innerHTML =
      `<div id="err"><strong>Todavía no hay datos.</strong><br>
      Esto es normal si el job aún no corrió. Andá a la pestaña <strong>Actions</strong>
      del repositorio y ejecutá <em>MCG - Actualizar precios</em> con el botón
      <em>Run workflow</em>. Cuando termine, recargá esta página.<br><br>
      <span style="color:#4A5568;font-size:12px">Detalle técnico: ${e.message}</span></div>`;
  });
</script>

<script>
// El nombre tipografico se muestra por defecto. El logo lo reemplaza unicamente
// si carga bien, asi nunca aparece un icono de imagen rota.
(function(){
  var img=document.getElementById('logo'), wm=document.getElementById('wordmark'), paso=0;
  if(!img) return;
  img.addEventListener('load', function(){
    if(!img.naturalWidth) return;
    img.style.display='block';
    if(wm) wm.style.display='none';
  });
  img.addEventListener('error', function(){
    paso++;
    if(paso===1){ img.src='logo.png'; }
  });
  img.src='logo.svg';
})();
</script>
</body>
</html>
