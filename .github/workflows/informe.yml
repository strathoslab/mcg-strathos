name: MCG - Generar informe mensual

on:
  workflow_dispatch:
    inputs:
      mes:
        description: "Mes del informe (formato AAAA-MM, por ejemplo 2026-07)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  informe:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Generar el informe del mes
        run: python scripts/generar_informe.py "${{ inputs.mes }}"

      - name: Guardar el DOCX en el repositorio
        run: |
          git config user.name "MCG Bot"
          git config user.email "actions@github.com"
          mkdir -p /tmp/out
          cp informe/*.docx /tmp/out/ 2>/dev/null || true
          if [ -z "$(ls -A /tmp/out 2>/dev/null)" ]; then
            echo "No se genero ningun DOCX."
            exit 1
          fi
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/out/*.docx informe/ 2>/dev/null || true
            git add informe/*.docx
            if git diff --staged --quiet; then
              echo "Sin cambios que guardar."
              exit 0
            fi
            git commit -m "MCG: informe ${{ inputs.mes }}"
            if git push; then
              echo "Push OK (intento $i)"
              exit 0
            fi
            echo "Push rechazado (intento $i). Reintentando sobre el ultimo main..."
            sleep 3
          done
          echo "No se pudo empujar tras varios intentos."
          exit 1
