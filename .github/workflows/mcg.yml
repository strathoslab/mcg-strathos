name: MCG - Actualizar precios

# Cuándo corre el job
on:
  schedule:
    # Todos los días a las 22:00 UTC (19:00 en Buenos Aires),
    # con los mercados de EE.UU. ya cerrados.
    - cron: "0 22 * * 1-5"
  # Permite ejecutarlo a mano desde la pestaña Actions, con un botón.
  workflow_dispatch:

# Necesario para que el job pueda guardar el archivo de resultados.
permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Traer precios y escribir el estado
        run: python scripts/traer_precios.py

      - name: Guardar el resultado en el repositorio
        run: |
          git config user.name "MCG Bot"
          git config user.email "actions@github.com"
          git add docs/mcg_estado.json
          if git diff --staged --quiet; then
            echo "Sin cambios que guardar."
          else
            git commit -m "MCG: actualización de precios $(date -u +'%Y-%m-%d')"
            git push
          fi
