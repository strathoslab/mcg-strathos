name: MCG - Actualizar precios

on:
  schedule:
    - cron: "0 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Traer precios y escribir el estado
        run: python scripts/traer_precios.py

      - name: Guardar el resultado en el repositorio
        run: |
          git config user.name "MCG Bot"
          git config user.email "actions@github.com"
          if [ ! -f docs/mcg_estado.json ]; then
            echo "No hay estado para guardar."
            exit 0
          fi
          cp docs/mcg_estado.json /tmp/estado.json
          for i in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/estado.json docs/mcg_estado.json
            git add docs/mcg_estado.json
            if git diff --staged --quiet; then
              echo "Sin cambios que guardar."
              exit 0
            fi
            git commit -m "MCG: actualizacion de precios $(date -u +'%Y-%m-%d')"
            if git push; then
              echo "Push OK (intento $i)"
              exit 0
            fi
            echo "Push rechazado (intento $i). Reintentando sobre el ultimo main..."
            sleep 3
          done
          echo "No se pudo empujar tras varios intentos."
          exit 1
