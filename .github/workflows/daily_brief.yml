name: Briefing Matutino Strathos Lab

on:
  schedule:
    # Corre a las 7:00 AM de Argentina (10:00 UTC)
    - cron: '0 10 * * *'
  workflow_dispatch: # Permite probarlo a mano cuando quieras

jobs:
  ejecutar-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el codigo del repositorio
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar librerías necesarias
        run: |
          pip install pandas yfinance requests google-generativeai

      - name: 1. Actualizar precios del monitor
        run: python scripts/traer_precios.py

      - name: 2. Generar y enviar el Brief por Email
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python brief_diario.py
