name: Briefing Matutino Strathos Lab
on:
  schedule:
    # 7:00 AM Argentina (10:00 UTC), de martes a sábado:
    # cubre los cierres de lunes a viernes.
    - cron: '0 10 * * 2-6'
  workflow_dispatch:

jobs:
  ejecutar-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el codigo del repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar librerias necesarias
        run: pip install requests groq

      - name: Generar y enviar el Brief por Email
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python scripts/brief_diario.py
